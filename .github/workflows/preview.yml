name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx vite build --base=/metaflow-hello-web-test/pr/${{ github.event.number }}/

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: pr/${{ github.event.number }}
          clean: false

      - uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://madebyae.github.io/metaflow-hello-web-test/pr/${{ github.event.number }}/';
            const body = `🔍 **Preview deployment ready**\n\n${url}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Preview deployment ready'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
